name: Generate Release Notes on Push to Main

on:
  push:
    branches:
      - main

jobs:
  release-notes:
    runs-on: ubuntu-latest
    # Skip if this push is itself the release notes commit to avoid infinite loops
    if: "!startsWith(github.event.head_commit.message, 'chore: release notes')"

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and prepend release notes entry
        id: build_entry
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.event.after }}"

          # Force-pushes can make github.event.before unreachable/invalid.
          if [[ "$BEFORE" != "0000000000000000000000000000000000000000" ]] && git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            COMMITS=$(git log "${BEFORE}..${AFTER}" --no-merges --pretty=format:"- %s [%h](https://github.com/${{ github.repository }}/commit/%h)")
          else
            COMMITS=$(git log "$AFTER" --no-merges --pretty=format:"- %s [%h](https://github.com/${{ github.repository }}/commit/%h)" | head -50)
          fi

          if [[ -z "$COMMITS" ]]; then
            echo "no_commits=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          DATE=$(date -u +"%Y-%m-%d")

          # Try to find PR number from merge commits in this push
          PR_NUMBER=""
          if [[ "$BEFORE" != "0000000000000000000000000000000000000000" ]] && git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            MERGE_COMMITS=$(git log "${BEFORE}..${AFTER}" --oneline --grep="Merge pull request" | head -1)
          else
            MERGE_COMMITS=$(git log "$AFTER" --oneline --grep="Merge pull request" | head -1)
          fi

          if [[ -n "$MERGE_COMMITS" ]]; then
            # Extract PR number from "Merge pull request #123"
            PR_NUMBER=$(echo "$MERGE_COMMITS" | grep -oP '#\K[0-9]+' | head -1)
          fi

          # Build header with PR title if available, otherwise use run link
          if [[ -n "$PR_NUMBER" ]]; then
            PR_TITLE=$(curl -fsSL \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/pulls/${PR_NUMBER}" \
              | jq -r '.title // empty')

            if [[ -n "$PR_TITLE" ]]; then
              HEADER="## ${DATE} — [${PR_TITLE}](https://github.com/${{ github.repository }}/pull/${PR_NUMBER})"
            else
              HEADER="## ${DATE} — [PR #${PR_NUMBER}](https://github.com/${{ github.repository }}/pull/${PR_NUMBER})"
            fi
          else
              LATEST_COMMIT_SHA="$AFTER"
              LATEST_COMMIT_MSG=$(git log -1 --pretty=%s "$LATEST_COMMIT_SHA")
              COMMIT_URL="https://github.com/${{ github.repository }}/commit/${LATEST_COMMIT_SHA}"
              HEADER="## ${DATE} — [${LATEST_COMMIT_MSG}](${COMMIT_URL})"
          fi

          ENTRY_FILE=$(mktemp)
          {
            echo "$HEADER"
            echo ""
            echo "$COMMITS"
            echo ""
          } > "$ENTRY_FILE"

          if [[ -f RELEASE_NOTES.md ]]; then
            if head -n 1 RELEASE_NOTES.md | grep -q '^# Release Notes'; then
              {
                echo "# Release Notes"
                echo ""
                cat "$ENTRY_FILE"
                tail -n +2 RELEASE_NOTES.md
              } > RELEASE_NOTES.new.md
            else
              {
                echo "# Release Notes"
                echo ""
                cat "$ENTRY_FILE"
                cat RELEASE_NOTES.md
              } > RELEASE_NOTES.new.md
            fi
          else
            {
              echo "# Release Notes"
              echo ""
              cat "$ENTRY_FILE"
            } > RELEASE_NOTES.new.md
          fi

          mv RELEASE_NOTES.new.md RELEASE_NOTES.md

          echo "no_commits=false" >> "$GITHUB_OUTPUT"

      - name: Commit and push release notes
        if: steps.build_entry.outputs.no_commits != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add RELEASE_NOTES.md

          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi

          DATE=$(date -u +"%Y-%m-%d")
          git commit -m "chore: release notes [${DATE}]"
          git push
